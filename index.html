<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Турнирная сетка 1/16</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .scroll-wrapper { width: 100%; overflow-x: auto; padding: 20px 0; }
        .tournament { position: relative; display: flex; gap: 20px; width: max-content; padding: 20px; }
        #lines-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .col-wrapper { display: flex; flex-direction: column; }
        .col-header { text-align: center; font-weight: bold; color: #94a3b8; font-size: 14px; margin-bottom: 20px; text-transform: uppercase; height: 20px; }
        .col { display: flex; flex-direction: column; justify-content: space-around; gap: 15px; flex-grow: 1; }
        .center-col { justify-content: center; gap: 80px; }
        .match-card { background-color: #1e293b; border: 2px solid #3b82f6; border-radius: 8px; padding: 8px; width: 180px; position: relative; z-index: 1; }
        .team-row { display: flex; align-items: center; margin-bottom: 4px; }
        .flag-container { width: 24px; height: 16px; background-color: #334155; margin-right: 5px; display: flex; justify-content: center; align-items: center; border-radius: 2px; }
        .flag-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .team-name { flex-grow: 1; width: 50px; margin-right: 5px; border: 1px solid #475569; background: #0f172a; color: white; padding: 4px; border-radius: 3px; -webkit-appearance: none; }
        .score { width: 25px; text-align: center; border: 1px solid #475569; background: #0f172a; color: white; padding: 4px; border-radius: 3px; }
        .winner { font-weight: bold; color: #fbbf24; border-color: #fbbf24; }
    </style>
</head>
<body>

<div class="scroll-wrapper">
    <div class="tournament">
        <svg id="lines-svg"></svg>
        <div class="col-wrapper"><div class="col-header">1/16</div><div class="col" id="col-16-l"></div></div>
        <div class="col-wrapper"><div class="col-header">1/8</div><div class="col" id="col-8-l"></div></div>
        <div class="col-wrapper"><div class="col-header">1/4</div><div class="col" id="col-4-l"></div></div>
        <div class="col-wrapper"><div class="col-header">1/2</div><div class="col" id="col-2-l"></div></div>
        <div class="col-wrapper">
            <div class="col-header"></div>
            <div class="col center-col"><div id="col-final"></div><div id="col-third"></div></div>
        </div>
        <div class="col-wrapper"><div class="col-header">1/2</div><div class="col" id="col-2-r"></div></div>
        <div class="col-wrapper"><div class="col-header">1/4</div><div class="col" id="col-4-r"></div></div>
        <div class="col-wrapper"><div class="col-header">1/8</div><div class="col" id="col-8-r"></div></div>
        <div class="col-wrapper"><div class="col-header">1/16</div><div class="col" id="col-16-r"></div></div>
    </div>
</div>

<datalist id="countries">
    <option value="Австралия" data-code="au">
    <option value="Австрия" data-code="at">
    <option value="Алжир" data-code="dz">
    <option value="Англия" data-code="gb-eng">
    <option value="Аргентина" data-code="ar">
    <option value="Бельгия" data-code="be">
    <option value="Босния и Герцеговина" data-code="ba">
    <option value="Бразилия" data-code="br">
    <option value="Гаити" data-code="ht">
    <option value="Гана" data-code="gh">
    <option value="Германия" data-code="de">
    <option value="ДР Конго" data-code="cd">
    <option value="Египет" data-code="eg">
    <option value="Иордания" data-code="jo">
    <option value="Ирак" data-code="iq">
    <option value="Иран" data-code="ir">
    <option value="Испания" data-code="es">
    <option value="Кабо-Верде" data-code="cv">
    <option value="Канада" data-code="ca">
    <option value="Катар" data-code="qa">
    <option value="Колумбия" data-code="co">
    <option value="Кот-д’Ивуар" data-code="ci">
    <option value="Кюрасао" data-code="cw">
    <option value="Марокко" data-code="ma">
    <option value="Мексика" data-code="mx">
    <option value="Нидерланды" data-code="nl">
    <option value="Новая Зеландия" data-code="nz">
    <option value="Норвегия" data-code="no">
    <option value="Панама" data-code="pa">
    <option value="Парагвай" data-code="py">
    <option value="Португалия" data-code="pt">
    <option value="Саудовская Аравия" data-code="sa">
    <option value="Сенегал" data-code="sn">
    <option value="США" data-code="us">
    <option value="Тунис" data-code="tn">
    <option value="Турция" data-code="tr">
    <option value="Узбекистан" data-code="uz">
    <option value="Уругвай" data-code="uy">
    <option value="Франция" data-code="fr">
    <option value="Хорватия" data-code="hr">
    <option value="Чехия" data-code="cz">
    <option value="Швейцария" data-code="ch">
    <option value="Швеция" data-code="se">
    <option value="Шотландия" data-code="gb-sct">
    <option value="ЮАР" data-code="za">
    <option value="Южная Корея" data-code="kr">
    <option value="Япония" data-code="jp">
</datalist>

<script>

    const bracketConfig = [
    // 1/16 финала (Левая сторона)
        { id: 'm1', next: 'm17', slot: 0, col: 'col-16-l', p1: '1-е место гр. E', p2: '3-е место гр. A/B/C/D/F' },
        { id: 'm2', next: 'm17', slot: 1, col: 'col-16-l', p1: 'Победитель гр. I', p2: '3-е место гр. C/D/F/G/H' },
        { id: 'm3', next: 'm18', slot: 0, col: 'col-16-l', p1: '2-е место гр. A', p2: '2-е место гр. B' },
        { id: 'm4', next: 'm18', slot: 1, col: 'col-16-l', p1: 'Победитель гр. F', p2: '2-е место гр. C' },
        { id: 'm5', next: 'm19', slot: 0, col: 'col-16-l', p1: '2-е место гр. K', p2: '2-е место гр. L' },
        { id: 'm6', next: 'm19', slot: 1, col: 'col-16-l', p1: 'Победитель гр. H', p2: '2-е место гр. J' },
        { id: 'm7', next: 'm20', slot: 0, col: 'col-16-l', p1: '1-е место гр. D', p2: '3-е место гр. B/I' },
        { id: 'm8', next: 'm20', slot: 1, col: 'col-16-l', p1: 'Победитель гр. G', p2: '3-е место гр. A/H/I/J' },
        
        // 1/8 финала (Левая сторона)
        { id: 'm17', next: 'm25', slot: 0, col: 'col-8-l' }, { id: 'm18', next: 'm25', slot: 1, col: 'col-8-l' },
        { id: 'm19', next: 'm26', slot: 0, col: 'col-8-l' }, { id: 'm20', next: 'm26', slot: 1, col: 'col-8-l' },
        
        // 1/4 финала (Левая сторона)
        { id: 'm25', next: 'm29', slot: 0, col: 'col-4-l' }, { id: 'm26', next: 'm29', slot: 1, col: 'col-4-l' },
        
        // 1/2 финала (Левая сторона)
        { id: 'm29', next: 'm31', slot: 0, col: 'col-2-l' }, 
    
        // 1/16 финала (Правая сторона)
        { id: 'm9', next: 'm21', slot: 0, col: 'col-16-r', p1: '1-е место гр. C', p2: '2-е место гр. F' },
        { id: 'm10', next: 'm21', slot: 1, col: 'col-16-r', p1: '2-е место гр. E', p2: '2-е место гр. I' },
        { id: 'm11', next: 'm22', slot: 0, col: 'col-16-r', p1: '1-е место гр. A', p2: '3-е место гр. C/E/F/H/I' },
        { id: 'm12', next: 'm22', slot: 1, col: 'col-16-r', p1: 'Победитель гр. L', p2: '3-е место гр. E/H/I/J/K' },
        { id: 'm13', next: 'm23', slot: 0, col: 'col-16-r', p1: '1-е место гр. J', p2: '2-е место гр. H' },
        { id: 'm14', next: 'm23', slot: 1, col: 'col-16-r', p1: '2-е место гр. D', p2: '2-е место гр. G' },
        { id: 'm15', next: 'm24', slot: 0, col: 'col-16-r', p1: '1-е место гр. B', p2: '3-е место гр. E/F/G/I/J' },
        { id: 'm16', next: 'm24', slot: 1, col: 'col-16-r', p1: 'Победитель гр. K', p2: '3-е место гр. D/E/I/J/L' },
        
        // 1/8 финала (Правая сторона)
        { id: 'm21', next: 'm27', slot: 0, col: 'col-8-r' }, { id: 'm22', next: 'm27', slot: 1, col: 'col-8-r' },
        { id: 'm23', next: 'm28', slot: 0, col: 'col-8-r' }, { id: 'm24', next: 'm28', slot: 1, col: 'col-8-r' },
        
        // 1/4 финала (Правая сторона)
        { id: 'm27', next: 'm30', slot: 0, col: 'col-4-r' }, { id: 'm28', next: 'm30', slot: 1, col: 'col-4-r' },
        
        // 1/2 финала (Правая сторона)
        { id: 'm30', next: 'm31', slot: 1, col: 'col-2-r' }, 
    
        // Финал и 3-е место
        { id: 'm31', next: null, slot: null, col: 'col-final', title: 'Финал' },
        { id: 'm32', next: null, slot: null, col: 'col-third', title: 'За 3-е место' }
    ];

    function generateBracket() {
        bracketConfig.forEach(match => {
            const cardHtml = `
                <div class="match-card" id="${match.id}" data-next="${match.next || ''}" data-slot="${match.slot !== null ? match.slot : ''}">
                    ${match.title ? `<div style="text-align:center; font-size:12px; color:#60a5fa">${match.title}</div>` : ''}
                    <div class="team-row">
                        <div class="flag-container"><img class="flag-img" src=""></div>
                        <input type="text" class="team-name" list="countries" placeholder="${match.p1 || 'Команда'}">
                        <input type="number" class="score" placeholder="-">
                    </div>
                    <div class="team-row">
                        <div class="flag-container"><img class="flag-img" src=""></div>
                        <input type="text" class="team-name" list="countries" placeholder="${match.p2 || 'Команда'}">
                        <input type="number" class="score" placeholder="-">
                    </div>
                </div>`;
            document.getElementById(match.col).innerHTML += cardHtml;
        });
        attachEvents();
    }

    const firebaseConfig = { databaseURL: "https://sffh-92a72-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function attachEvents() {
    document.querySelectorAll('.team-name').forEach(input => {
        input.addEventListener('input', function() {
            const val = this.value;
            const opts = document.getElementById('countries').options;
            const img = this.parentElement.querySelector('.flag-img');
            
            let found = false;
            // Проверяем, есть ли такой вариант в списке
            for (let i = 0; i < opts.length; i++) {
                if (opts[i].value === val) {
                    img.src = `https://flagcdn.com/${opts[i].getAttribute('data-code')}.svg`;
                    img.style.display = 'block';
                    found = true;
                    break;
                }
            }
            
            // Если поле очистили или ввели ерунду — прячем флаг
            if (!found || val === "") {
                img.style.display = 'none';
                img.src = "";
            }
            
            saveToFirebase(); // Сохраняем пустое состояние в базу
        });
    });

    document.querySelectorAll('.score').forEach(input => {
        input.addEventListener('input', () => { checkWinnerAndAdvance(input.closest('.match-card')); });
    });
}

    function saveToFirebase() {
        const state = {};
        document.querySelectorAll('.match-card').forEach(card => {
            const names = card.querySelectorAll('.team-name');
            const scores = card.querySelectorAll('.score');
            const flags = card.querySelectorAll('.flag-img');
            state[card.id] = { 
                n0: n[0].value, 
                f0: (n[0].value && f[0].style.display === 'block') ? f[0].src : '', 
                n1: n[1].value, 
                f1: (n[1].value && f[1].style.display === 'block') ? f[1].src : '' 
            };
        });
        database.ref('worldCupState').set(state);
    }

    database.ref('worldCupState').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.querySelectorAll('.match-card').forEach(card => {
                const d = data[card.id];
                if (!d) return;
                const names = card.querySelectorAll('.team-name');
                const scores = card.querySelectorAll('.score');
                const flags = card.querySelectorAll('.flag-img');
                names[0].value = d.n1; scores[0].value = d.s1; flags[0].src = d.f1; flags[0].style.display = (d.f1 && d.n1) ? 'block' : 'none';
                names[1].value = d.n2; scores[1].value = d.s2; flags[1].src = d.f2; flags[1].style.display = (d.f2 && d.n2) ? 'block' : 'none';
            });
            drawLines();
        }
    });

    function checkWinnerAndAdvance(card) {
        const s = card.querySelectorAll('.score');
        const n = card.querySelectorAll('.team-name');
        const f = card.querySelectorAll('.flag-img');
        const nextId = card.getAttribute('data-next');
        const slot = parseInt(card.getAttribute('data-slot'));
        
        let win = -1;
        if (s[0].value !== "" && s[1].value !== "") {
            win = parseInt(s[0].value) > parseInt(s[1].value) ? 0 : 1;
        }

        if (nextId && win !== -1) {
            const nextCard = document.getElementById(nextId);
            const nextN = nextCard.querySelectorAll('.team-name');
            const nextF = nextCard.querySelectorAll('.flag-img');
            nextN[slot].value = n[win].value;
            nextF[slot].src = f[win].src;
            nextF[slot].style.display = 'block';
        }
        saveToFirebase();
    }

    function drawLines() {
        const svg = document.getElementById('lines-svg');
        svg.innerHTML = '';
        const t = document.querySelector('.tournament').getBoundingClientRect();
        bracketConfig.forEach(m => {
            if (m.next) {
                const c1 = document.getElementById(m.id).getBoundingClientRect();
                const c2 = document.getElementById(m.next).getBoundingClientRect();
                const d = `M ${m.col.includes('l') ? c1.right-t.left : c1.left-t.left} ${c1.top+c1.height/2-t.top} L ${c1.right+(c2.left-c1.right)/2-t.left} ${c1.top+c1.height/2-t.top} L ${c1.right+(c2.left-c1.right)/2-t.left} ${c2.top+c2.height/2-t.top} L ${m.col.includes('l') ? c2.left-t.left : c2.right-t.left} ${c2.top+c2.height/2-t.top}`;
                svg.innerHTML += `<path d="${d}" fill="transparent" stroke="#1e293b" stroke-width="2"/>`;
            }
        });
    }

    window.onload = () => { generateBracket(); setTimeout(drawLines, 200); };
</script>
</body>
</html>
